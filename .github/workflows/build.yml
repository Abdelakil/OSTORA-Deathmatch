name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore ./source/Deathmatch/Deathmatch.csproj
      
    - name: Build
      run: dotnet build ./source/Deathmatch/Deathmatch.csproj --configuration Release --no-restore
      
    - name: Create release structure
      run: |
        mkdir -p release/plugins/Deathmatch/lang
        mkdir -p release/plugins/Deathmatch/spawns
        mkdir -p release/shared/DeathmatchAPI
        
        # Copy DLL files
        cp ./source/Deathmatch/bin/Release/net8.0/Deathmatch.dll release/plugins/Deathmatch/
        cp ./source/Deathmatch/bin/Release/net8.0/Deathmatch.deps.json release/plugins/Deathmatch/
        cp ./source/Deathmatch/bin/Release/net8.0/Deathmatch.pdb release/plugins/Deathmatch/
        cp ./source/DeathmatchAPI/bin/Release/net8.0/DeathmatchAPI.dll release/shared/DeathmatchAPI/
        cp ./source/DeathmatchAPI/bin/Release/net8.0/DeathmatchAPI.deps.json release/shared/DeathmatchAPI/
        cp ./source/DeathmatchAPI/bin/Release/net8.0/DeathmatchAPI.pdb release/shared/DeathmatchAPI/
        
        # Copy dependencies if they exist
        if [ -f "./source/Deathmatch/bin/Release/net8.0/MySqlConnector.dll" ]; then
          cp ./source/Deathmatch/bin/Release/net8.0/MySqlConnector.dll release/plugins/Deathmatch/
        fi
        if [ -f "./source/Deathmatch/bin/Release/net8.0/Newtonsoft.Json.dll" ]; then
          cp ./source/Deathmatch/bin/Release/net8.0/Newtonsoft.Json.dll release/plugins/Deathmatch/
        fi
        
        # Copy language files
        cp ./Lang/*.json release/plugins/Deathmatch/lang/
        
        # Copy only mirage spawn file
        cp "./Spawns Locations/de_mirage.json" release/plugins/Deathmatch/spawns/
        
    - name: Create release zip
      run: |
        cd release
        zip -r ../OSTORA-Deathmatch.zip .
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: deathmatch-plugin
        path: OSTORA-Deathmatch.zip
        
    - name: Get version
      id: version
      run: echo "VERSION=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
      
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        name: Deathmatch Plugin v${{ steps.version.outputs.VERSION }}
        tag_name: v${{ steps.version.outputs.VERSION }}
        body: |
          ## Deathmatch Plugin v${{ steps.version.outputs.VERSION }}
          
          ### Features
          - MaxPlayers spawn configuration
          - Player count-based spawn filtering
          - Enhanced logging system
          - Optimized spawn selection
          
          ### Installation
          1. Download `OSTORA-Deathmatch.zip` from the assets below
          2. Extract to your CS2 server's `addons/counterstrikesharp/` directory
          3. Restart your server or reload the plugin
          
          ### Configuration
          - Spawn files are located in `addons/counterstrikesharp/plugins/Deathmatch/spawns/`
          - Configure `minPlayers` and `maxPlayers` for each spawn point
          
        files: |
          OSTORA-Deathmatch.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
